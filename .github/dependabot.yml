version: 2
updates:
  - package-ecosystem: "devcontainers"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:30"
      timezone: "UTC"
    open-pull-requests-limit: 5
    groups:
      devcontainers-safe:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    groups:
      npm-dev-safe:
        applies-to: version-updates
        dependency-type: development
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:30"
      timezone: "UTC"
    open-pull-requests-limit: 10
    groups:
      github-actions-safe:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"

  - package-ecosystem: "cargo"
    directories:
      - /apps/code-tauri/src-tauri
      - /internal/runtime-policy-rs
      - /packages/code-runtime-service-rs
      - /packages/discovery-rs
      - /packages/model-fabric-rs
      - /packages/runtime-diagnostics-export-core-rs
      - /packages/runtime-shell-core-rs
      - /packages/sandbox-rs
      - /packages/tokenizer-rs/native
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "05:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    groups:
      cargo-cross-dir-safe:
        applies-to: version-updates
        patterns:
          - "*"
        group-by: dependency-name
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"
