name: Setup Playwright
description: Install the Playwright browser runtime required by E2E workflows.

inputs:
  install-command:
    description: Command used to install Playwright browsers
    required: false
    default: "pnpm -C tests/e2e exec playwright install chromium"

runs:
  using: composite
  steps:
    - name: Install Playwright browsers
      shell: bash
      run: ${{ inputs.install-command }}
