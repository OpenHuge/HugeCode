name: Setup Playwright
description: Install the Playwright browser runtime required by E2E workflows.

inputs:
  install-command:
    description: Command used to install Playwright browsers
    required: false
    default: "pnpm -C tests/e2e exec playwright install --only-shell chromium"

runs:
  using: composite
  steps:
    - name: Cache Playwright browsers
      uses: actions/cache@v5
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ hashFiles('tests/e2e/package.json', 'pnpm-lock.yaml', '.github/actions/setup-playwright/action.yml') }}
        restore-keys: |
          playwright-${{ runner.os }}-

    - name: Install Playwright browsers
      shell: bash
      run: ${{ inputs.install-command }}
