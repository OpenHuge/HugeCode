name: Dependency Review

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: dependency-review-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  dependency_review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Detect dependency review support
        id: support
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          repo_response="$(
            curl -fsSL \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}"
          )"

          dependency_graph_status="$(
            printf '%s' "${repo_response}" | jq -r '.security_and_analysis.dependency_graph_status // empty'
          )"

          if [[ "${dependency_graph_status}" == "enabled" ]]; then
            echo "supported=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "supported=false" >> "${GITHUB_OUTPUT}"
          echo "Dependency graph is unavailable for ${GITHUB_REPOSITORY}; skipping dependency review."

      - name: Dependency Review
        if: steps.support.outputs.supported == 'true'
        uses: actions/dependency-review-action@v4
        with:
          config-file: ./.github/dependency-review-config.yml

      - name: Skip unsupported dependency review
        if: steps.support.outputs.supported != 'true'
        run: echo "Dependency Review skipped because dependency graph is unavailable."
