name: _reusable-ci-frontend-optimization

on:
  workflow_call:

env:
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_API: ${{ vars.TURBO_API }}

jobs:
  frontend_optimization:
    name: frontend_optimization
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CARGO_TARGET_DIR: .cache/cargo-target
      PW_WEBSERVER_TIMEOUT_MS: "900000"
      CODE_RUNTIME_SERVICE_READY_TIMEOUT_MS: "900000"
      TURBO_CACHE_DIR: .turbo
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-pnpm
        with:
          install-command: pnpm install --offline --frozen-lockfile

      - uses: ./.github/actions/cache-turbo

      - uses: ./.github/actions/setup-rust-ci
        with:
          enable-sccache: "true"
          cargo-cache-path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            .cache/cargo-target
          cargo-cache-key: ${{ runner.os }}-code-runtime-service-dev

      - uses: ./.github/actions/install-linux-desktop-deps

      - uses: ./.github/actions/setup-playwright

      - name: Frontend optimization gate
        run: pnpm validate:frontend-optimization
