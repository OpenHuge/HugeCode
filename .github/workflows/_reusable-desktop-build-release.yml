name: _reusable-desktop-build-release

on:
  workflow_call:
    inputs:
      runner:
        required: true
        type: string
      rust_target:
        required: true
        type: string
      bundle_targets:
        required: true
        type: string
      artifact_path:
        required: true
        type: string
      artifact_name:
        required: true
        type: string
      cargo_cache_key:
        required: true
        type: string
      enable_sccache:
        required: false
        type: string
        default: "true"
      host_check_command:
        required: false
        type: string
        default: ""

jobs:
  build_release:
    name: Build
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - name: Skip dedicated release packaging lane
        run: |
          echo "Skipping dedicated desktop release packaging for target ${{ inputs.rust_target }}."
          echo "Release packaging is handled through the active Electron release flow."
