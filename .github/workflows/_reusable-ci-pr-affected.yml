name: _reusable-ci-pr-affected

on:
  workflow_call:
    inputs:
      ci_required:
        required: true
        type: boolean
      skip_expensive_checks:
        required: false
        type: boolean
        default: false
      affected_build_required:
        required: false
        type: boolean
        default: true
      base_ref:
        required: false
        type: string
        default: ""

env:
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_API: ${{ vars.TURBO_API }}

jobs:
  pr_affected:
    name: PR Affected Checks
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      TURBO_CACHE_DIR: .turbo
    steps:
      - uses: actions/checkout@v6

      - name: Skip affected build/tests for non-code change
        if: ${{ !inputs.ci_required }}
        run: echo "Skipping affected build/tests for non-code changes."

      - name: Ensure PR base ref is available
        if: github.event_name == 'pull_request' && inputs.base_ref != ''
        run: |
          git fetch --no-tags --prune --depth=1 origin \
            +refs/heads/${{ inputs.base_ref }}:refs/remotes/origin/${{ inputs.base_ref }}

      - id: scope
        name: Classify PR scope
        if: github.event_name == 'pull_request' && inputs.base_ref != ''
        env:
          CI_SCOPE_BASE_REF: origin/${{ inputs.base_ref }}
          CI_SCOPE_HEAD_REF: HEAD
        run: node scripts/classify-ci-change-scope.mjs

      - name: Skip repo-governance-only PR
        if: github.event_name == 'pull_request' && steps.scope.outputs.repo_governance_only == 'true'
        run: echo "Skipping affected build/tests for repo-governance-only pull request changes."

      - name: Skip affected build/tests for low-risk Dependabot update
        if: ${{ inputs.ci_required && inputs.skip_expensive_checks }}
        run: echo "Skipping affected build/tests for low-risk Dependabot dependency update."

      - uses: ./.github/actions/setup-node-pnpm
        if: inputs.ci_required && !inputs.skip_expensive_checks && (github.event_name != 'pull_request' || steps.scope.outputs.repo_governance_only != 'true')
        with:
          install-command: pnpm install --offline --frozen-lockfile

      - if: inputs.ci_required && !inputs.skip_expensive_checks && (github.event_name != 'pull_request' || steps.scope.outputs.repo_governance_only != 'true')
        uses: ./.github/actions/cache-turbo

      - name: Build (affected)
        if: inputs.ci_required && !inputs.skip_expensive_checks && inputs.affected_build_required && (github.event_name != 'pull_request' || steps.scope.outputs.repo_governance_only != 'true')
        env:
          TURBO_BASE_REF: ${{ inputs.base_ref != '' && format('origin/{0}', inputs.base_ref) || '' }}
        run: pnpm build:affected -- --filter=!@ku0/code-tauri

      - name: Skip affected build for test-only scope
        if: inputs.ci_required && !inputs.skip_expensive_checks && !inputs.affected_build_required && (github.event_name != 'pull_request' || steps.scope.outputs.repo_governance_only != 'true')
        run: echo "Skipping affected build because the PR only changes tests, fixtures, stories, or markdown-like frontend surfaces."

      - name: Tests (affected)
        if: inputs.ci_required && !inputs.skip_expensive_checks && (github.event_name != 'pull_request' || steps.scope.outputs.repo_governance_only != 'true')
        env:
          TURBO_BASE_REF: ${{ inputs.base_ref != '' && format('origin/{0}', inputs.base_ref) || '' }}
        run: pnpm test:affected -- --filter=!@ku0/code-tauri
