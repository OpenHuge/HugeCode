name: _reusable-ci-pr-affected

on:
  workflow_call:
    inputs:
      ci_required:
        required: true
        type: boolean
      repo_governance_only:
        required: false
        type: boolean
        default: false
      skip_expensive_checks:
        required: false
        type: boolean
        default: false
      build_result:
        required: false
        type: string
        default: "skipped"
      tests_result:
        required: false
        type: string
        default: "skipped"

jobs:
  pr_affected:
    name: PR Affected Checks
    runs-on: ubuntu-latest
    steps:
      - name: Summarize affected gate results
        env:
          BUILD_RESULT: ${{ inputs.build_result }}
          CI_REQUIRED: ${{ inputs.ci_required }}
          REPO_GOVERNANCE_ONLY: ${{ inputs.repo_governance_only }}
          SKIP_EXPENSIVE_CHECKS: ${{ inputs.skip_expensive_checks }}
          TESTS_RESULT: ${{ inputs.tests_result }}
        run: |
          if [[ "$CI_REQUIRED" != "true" ]]; then
            echo "Skipping affected build/tests for non-code changes."
            exit 0
          fi

          if [[ "$REPO_GOVERNANCE_ONLY" == "true" ]]; then
            echo "Skipping affected build/tests for repo-governance-only changes."
            exit 0
          fi

          if [[ "$SKIP_EXPENSIVE_CHECKS" == "true" ]]; then
            echo "Skipping affected build/tests for low-risk Dependabot dependency update."
            exit 0
          fi

          failed=0
          for result in "$BUILD_RESULT" "$TESTS_RESULT"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              failed=1
            fi
          done

          if [[ $failed -ne 0 ]]; then
            echo "Affected build/test sub-jobs did not all pass."
            exit 1
          fi

          echo "Affected build/test sub-jobs passed or were intentionally skipped."
