name: Desktop (Tauri)

on:
  workflow_dispatch:
    inputs:
      prebuild_mode:
        description: Prebuild mode for code dist
        type: choice
        required: false
        default: auto
        options:
          - auto
          - fast
          - full
  pull_request:
    paths:
      - "apps/code-tauri/**"
      - "apps/code/package.json"
      - "apps/code/index.html"
      - "apps/code/vite.config.ts"
      - "apps/code/src/main.tsx"
      - "apps/code/src/bootstrap/**"
      - "apps/code/src/application/runtime/**"
      - "apps/code/src/services/runtimeClient*"
      - "apps/code/src/services/tauri*"
      - "apps/code/src/services/textFileGateway.ts"
      - "apps/code/src/features/update/**"
      - ".github/workflows/_reusable-desktop-prepare-frontend.yml"
      - ".github/workflows/_reusable-desktop-build-pr.yml"
      - ".github/workflows/_reusable-desktop-build-release.yml"
      - ".github/actions/cache-turbo/**"
      - ".github/actions/install-linux-desktop-deps/**"
      - ".github/actions/restore-artifact/**"
      - ".github/actions/setup-desktop-build-env/**"
      - ".github/actions/setup-node-pnpm/**"
      - ".github/actions/setup-rust-ci/**"
      - ".github/actions/upload-workflow-artifact/**"
      - ".github/workflows/desktop.yml"
  push:
    branches:
      - main
    paths:
      - "apps/code-tauri/**"
      - "apps/code/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/_reusable-desktop-prepare-frontend.yml"
      - ".github/workflows/_reusable-desktop-build-pr.yml"
      - ".github/workflows/_reusable-desktop-build-release.yml"
      - ".github/actions/cache-turbo/**"
      - ".github/actions/install-linux-desktop-deps/**"
      - ".github/actions/restore-artifact/**"
      - ".github/actions/setup-desktop-build-env/**"
      - ".github/actions/setup-node-pnpm/**"
      - ".github/actions/setup-rust-ci/**"
      - ".github/actions/upload-workflow-artifact/**"
      - ".github/workflows/desktop.yml"

permissions:
  contents: read

concurrency:
  group: desktop-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect desktop-relevant changes
    runs-on: ubuntu-latest
    outputs:
      desktop_required: ${{ github.event_name == 'workflow_dispatch' || (steps.scope.outputs.repo_governance_only != 'true' && (steps.filter.outputs.desktop == 'true' || steps.filter.outputs.desktop_frontend == 'true' || steps.scope.outputs.desktop_manifest_changed == 'true')) }}
      desktop_full_pr_matrix_required: ${{ github.event_name == 'workflow_dispatch' || (steps.scope.outputs.repo_governance_only != 'true' && (steps.filter.outputs.desktop_host == 'true' || steps.scope.outputs.desktop_manifest_changed == 'true')) }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Ensure diff base is available
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags --prune --depth=1 origin \
            +refs/heads/${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}

      - id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            desktop:
              - "apps/code-tauri/**"
              - ".github/workflows/_reusable-desktop-prepare-frontend.yml"
              - ".github/workflows/_reusable-desktop-build-pr.yml"
              - ".github/workflows/_reusable-desktop-build-release.yml"
              - ".github/actions/cache-turbo/**"
              - ".github/actions/install-linux-desktop-deps/**"
              - ".github/actions/restore-artifact/**"
              - ".github/actions/setup-desktop-build-env/**"
              - ".github/actions/setup-node-pnpm/**"
              - ".github/actions/setup-rust-ci/**"
              - ".github/actions/upload-workflow-artifact/**"
            desktop_frontend:
              - "apps/code/package.json"
              - "apps/code/index.html"
              - "apps/code/vite.config.ts"
              - "apps/code/src/main.tsx"
              - "apps/code/src/bootstrap/**"
              - "apps/code/src/web/**"
              - "!apps/code/src/web/**/*.md"
              - "!apps/code/src/web/**/*.mdx"
              - "!apps/code/src/web/**/*.test.ts"
              - "!apps/code/src/web/**/*.test.tsx"
              - "!apps/code/src/web/**/*.spec.ts"
              - "!apps/code/src/web/**/*.spec.tsx"
              - "!apps/code/src/web/**/*.stories.ts"
              - "!apps/code/src/web/**/*.stories.tsx"
              - "!apps/code/src/web/**/*.stories.mdx"
              - "!apps/code/src/web/**/__tests__/**"
              - "apps/code/src/application/runtime/**"
              - "!apps/code/src/application/runtime/**/*.md"
              - "!apps/code/src/application/runtime/**/*.mdx"
              - "!apps/code/src/application/runtime/**/*.test.ts"
              - "!apps/code/src/application/runtime/**/*.test.tsx"
              - "!apps/code/src/application/runtime/**/*.spec.ts"
              - "!apps/code/src/application/runtime/**/*.spec.tsx"
              - "!apps/code/src/application/runtime/**/*.stories.ts"
              - "!apps/code/src/application/runtime/**/*.stories.tsx"
              - "!apps/code/src/application/runtime/**/*.stories.mdx"
              - "!apps/code/src/application/runtime/**/__tests__/**"
              - "apps/code/src/services/runtimeClient*"
              - "apps/code/src/services/tauri*"
              - "apps/code/src/services/textFileGateway.ts"
              - "apps/code/src/features/update/**"
              - "!apps/code/src/features/update/**/*.md"
              - "!apps/code/src/features/update/**/*.mdx"
              - "!apps/code/src/features/update/**/*.test.ts"
              - "!apps/code/src/features/update/**/*.test.tsx"
              - "!apps/code/src/features/update/**/*.spec.ts"
              - "!apps/code/src/features/update/**/*.spec.tsx"
              - "!apps/code/src/features/update/**/*.stories.ts"
              - "!apps/code/src/features/update/**/*.stories.tsx"
              - "!apps/code/src/features/update/**/*.stories.mdx"
            desktop_host:
              - "apps/code-tauri/**"
              - ".github/workflows/_reusable-desktop-prepare-frontend.yml"
              - ".github/workflows/_reusable-desktop-build-pr.yml"
              - ".github/workflows/_reusable-desktop-build-release.yml"
              - ".github/actions/cache-turbo/**"
              - ".github/actions/install-linux-desktop-deps/**"
              - ".github/actions/restore-artifact/**"
              - ".github/actions/setup-desktop-build-env/**"
              - ".github/actions/setup-node-pnpm/**"
              - ".github/actions/setup-rust-ci/**"
              - ".github/actions/upload-workflow-artifact/**"

      - id: scope
        name: Classify dependency manifest scope
        env:
          CI_SCOPE_BASE_REF: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || 'HEAD^' }}
          CI_SCOPE_HEAD_REF: HEAD
        run: node scripts/classify-ci-change-scope.mjs

  prepare-frontend:
    name: Prepare frontend dist
    needs: changes
    if: needs.changes.outputs.desktop_required == 'true'
    uses: ./.github/workflows/_reusable-desktop-prepare-frontend.yml
    secrets: inherit
    with:
      prebuild_mode: ${{ github.event_name == 'workflow_dispatch' && inputs.prebuild_mode || 'auto' }}

  build-pr-fast:
    name: Build PR (${{ matrix.name }})
    if: github.event_name == 'pull_request' && needs.changes.outputs.desktop_required == 'true' && needs.changes.outputs.desktop_full_pr_matrix_required != 'true'
    needs: [changes, prepare-frontend]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            id: linux-x64
            runner: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            host_check_command: ""
            enable_sccache: "true"
    uses: ./.github/workflows/_reusable-desktop-build-pr.yml
    secrets: inherit
    with:
      runner: ${{ matrix.runner }}
      rust_target: ${{ matrix.rust_target }}
      cargo_cache_key: ${{ matrix.id }}
      enable_sccache: ${{ matrix.enable_sccache }}
      host_check_command: ${{ matrix.host_check_command }}

  build-pr-full:
    name: Build PR (${{ matrix.name }})
    if: github.event_name == 'pull_request' && needs.changes.outputs.desktop_full_pr_matrix_required == 'true'
    needs: [changes, prepare-frontend]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            id: macos-apple-silicon
            runner: macos-14
            rust_target: aarch64-apple-darwin
            host_check_command: ""
            enable_sccache: "true"
          - name: Windows x64
            id: windows-x64
            runner: windows-latest
            rust_target: x86_64-pc-windows-msvc
            host_check_command: pnpm desktop:doctor:windows
            enable_sccache: "true"
          - name: Linux x64
            id: linux-x64
            runner: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            host_check_command: ""
            enable_sccache: "true"
    uses: ./.github/workflows/_reusable-desktop-build-pr.yml
    secrets: inherit
    with:
      runner: ${{ matrix.runner }}
      rust_target: ${{ matrix.rust_target }}
      cargo_cache_key: ${{ matrix.id }}
      enable_sccache: ${{ matrix.enable_sccache }}
      host_check_command: ${{ matrix.host_check_command }}

  build-release:
    name: Build (${{ matrix.name }})
    if: github.event_name != 'pull_request' && needs.changes.outputs.desktop_required == 'true'
    needs: [changes, prepare-frontend]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Intel
            id: macos-intel
            # Cross-compile x86_64 target on Apple Silicon runner for faster availability.
            runner: macos-14
            rust_target: x86_64-apple-darwin
            bundle_targets: dmg
            artifact_path: apps/code-tauri/src-tauri/target/x86_64-apple-darwin/release/bundle/**/*
            host_check_command: ""
          - name: macOS Apple Silicon
            id: macos-apple-silicon
            runner: macos-14
            rust_target: aarch64-apple-darwin
            bundle_targets: dmg
            artifact_path: apps/code-tauri/src-tauri/target/aarch64-apple-darwin/release/bundle/**/*
            host_check_command: ""
          - name: Windows x64
            id: windows-x64
            runner: windows-latest
            rust_target: x86_64-pc-windows-msvc
            bundle_targets: nsis
            artifact_path: apps/code-tauri/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*
            host_check_command: pnpm desktop:doctor:windows
          - name: Linux x64
            id: linux-x64
            runner: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            bundle_targets: deb,appimage
            artifact_path: apps/code-tauri/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/**/*
            host_check_command: ""
          - name: Linux ARM64
            id: linux-arm64
            runner: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-gnu
            bundle_targets: deb,appimage
            artifact_path: apps/code-tauri/src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/**/*
            host_check_command: ""
    uses: ./.github/workflows/_reusable-desktop-build-release.yml
    secrets: inherit
    with:
      runner: ${{ matrix.runner }}
      rust_target: ${{ matrix.rust_target }}
      bundle_targets: ${{ matrix.bundle_targets }}
      artifact_path: ${{ matrix.artifact_path }}
      artifact_name: desktop-${{ matrix.id }}
      cargo_cache_key: ${{ matrix.id }}
      enable_sccache: ${{ matrix.id != 'windows-arm64' && 'true' || 'false' }}
      host_check_command: ${{ matrix.host_check_command }}
