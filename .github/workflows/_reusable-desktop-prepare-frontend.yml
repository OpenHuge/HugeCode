name: _reusable-desktop-prepare-frontend

on:
  workflow_call:
    inputs:
      prebuild_mode:
        required: false
        type: string
        default: auto

env:
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_API: ${{ vars.TURBO_API }}

jobs:
  prepare_frontend:
    name: Prepare frontend dist
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - name: Skip dedicated frontend dist preparation
        run: |
          echo "The Electron desktop workflow builds renderer assets inside the active desktop lanes."
          echo "No separate shared frontend artifact is required for this reusable workflow."
