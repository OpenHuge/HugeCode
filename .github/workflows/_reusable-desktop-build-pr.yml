name: _reusable-desktop-build-pr

on:
  workflow_call:
    inputs:
      runner:
        required: true
        type: string
      rust_target:
        required: true
        type: string
      cargo_cache_key:
        required: true
        type: string
      enable_sccache:
        required: false
        type: string
        default: "true"
      host_check_command:
        required: false
        type: string
        default: ""
      prebuild_mode:
        required: false
        type: string
        default: "skip"
      restore_frontend_artifact:
        required: false
        type: string
        default: "true"
      verification_mode:
        required: false
        type: string
        default: "build"
      check_base_branch:
        required: false
        type: string
        default: ""

jobs:
  build_pr:
    name: Build PR
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 35
    env:
      RUST_BACKTRACE: 1
      CARGO_INCREMENTAL: "0"
    steps:
      - uses: actions/checkout@v6

      - name: Ensure diff base is available
        if: ${{ inputs.verification_mode == 'check' && inputs.check_base_branch != '' }}
        run: |
          git fetch --no-tags --prune --depth=1 origin \
            +refs/heads/${{ inputs.check_base_branch }}:refs/remotes/origin/${{ inputs.check_base_branch }}

      - uses: ./.github/actions/setup-desktop-build-env
        with:
          targets: ${{ inputs.rust_target }}
          enable-sccache: ${{ inputs.enable_sccache }}
          cargo-cache-key: ${{ inputs.cargo_cache_key }}
          restore-artifact: ${{ inputs.restore_frontend_artifact }}

      - name: Run platform host checks
        if: ${{ inputs.host_check_command != '' }}
        run: ${{ inputs.host_check_command }}

      - name: Validate desktop capabilities
        if: contains(inputs.rust_target, 'windows')
        run: pnpm check:desktop-capabilities

      - name: Run desktop smoke tests
        if: contains(inputs.rust_target, 'windows')
        run: pnpm test:desktop:smoke

      - name: Prepare frontend dist locally
        if: ${{ inputs.prebuild_mode != 'skip' }}
        env:
          DESKTOP_PREBUILD_MODE: ${{ inputs.prebuild_mode }}
        run: |
          echo "desktop prebuild=${DESKTOP_PREBUILD_MODE}"
          pnpm desktop:prepare

      - name: Run desktop fast checks
        if: ${{ inputs.verification_mode == 'check' }}
        env:
          CODE_TAURI_CHECK_BASE_REF: ${{ inputs.check_base_branch != '' && format('origin/{0}', inputs.check_base_branch) || '' }}
          CODE_TAURI_CHECK_HEAD_REF: HEAD
        run: |
          pnpm check:desktop-capabilities
          pnpm --filter @ku0/code-tauri run check

      - name: Build Tauri app (fast verify)
        if: ${{ inputs.verification_mode != 'check' }}
        env:
          DESKTOP_PREBUILD_MODE: skip
        run: |
          echo "desktop prebuild=${DESKTOP_PREBUILD_MODE}"
          pnpm --filter @ku0/code-tauri run build -- --target ${{ inputs.rust_target }} --debug --no-bundle

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats
