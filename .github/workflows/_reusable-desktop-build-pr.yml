name: _reusable-desktop-build-pr

on:
  workflow_call:
    inputs:
      runner:
        required: true
        type: string
      rust_target:
        required: true
        type: string
      cargo_cache_key:
        required: true
        type: string
      enable_sccache:
        required: false
        type: string
        default: "true"
      host_check_command:
        required: false
        type: string
        default: ""
      prebuild_mode:
        required: false
        type: string
        default: "skip"
      restore_frontend_artifact:
        required: false
        type: string
        default: "true"
      verification_mode:
        required: false
        type: string
        default: "build"
      check_base_branch:
        required: false
        type: string
        default: ""

jobs:
  build_pr:
    name: Build PR
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - name: Skip dedicated packaging PR lane
        run: |
          echo "Skipping dedicated desktop packaging for target ${{ inputs.rust_target }}."
          echo "Electron verification is covered by the active shared desktop lanes."
