name: _reusable-ci-quality

on:
  workflow_call:
    inputs:
      ci_required:
        required: true
        type: boolean
      repo_governance_only:
        required: false
        type: boolean
        default: false
      baseline_result:
        required: false
        type: string
        default: "skipped"
      runtime_contract_parity_result:
        required: false
        type: string
        default: "skipped"
      typecheck_result:
        required: false
        type: string
        default: "skipped"

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - name: Summarize quality gate results
        env:
          BASELINE_RESULT: ${{ inputs.baseline_result }}
          CI_REQUIRED: ${{ inputs.ci_required }}
          REPO_GOVERNANCE_ONLY: ${{ inputs.repo_governance_only }}
          RUNTIME_CONTRACT_PARITY_RESULT: ${{ inputs.runtime_contract_parity_result }}
          TYPECHECK_RESULT: ${{ inputs.typecheck_result }}
        run: |
          if [[ "$CI_REQUIRED" != "true" ]]; then
            echo "Skipping quality execution for non-code changes."
            exit 0
          fi

          if [[ "$REPO_GOVERNANCE_ONLY" == "true" ]]; then
            echo "Skipping quality execution for repo-governance-only affected changes."
            exit 0
          fi

          failed=0
          for result in "$BASELINE_RESULT" "$RUNTIME_CONTRACT_PARITY_RESULT" "$TYPECHECK_RESULT"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              failed=1
            fi
          done

          if [[ $failed -ne 0 ]]; then
            echo "Quality sub-jobs did not all pass."
            exit 1
          fi

          echo "Quality sub-jobs passed or were intentionally skipped."
