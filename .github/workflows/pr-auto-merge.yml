name: PR Auto Merge

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - labeled
      - unlabeled
  pull_request_review:
    types:
      - submitted
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-auto-merge-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  enable_auto_merge:
    name: Reconcile auto-merge for approved in-repo pull requests
    if: >-
      github.event_name != 'pull_request_target' || (
        github.event.pull_request.state == 'open' &&
        !github.event.pull_request.draft &&
        github.event.pull_request.user.login != 'dependabot[bot]' &&
        github.event.pull_request.user.login != 'app/dependabot'
      )
    runs-on: ubuntu-latest
    steps:
      - name: Reconcile approved pull requests
        env:
          EVENT_NAME: ${{ github.event_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_QUEUE_ENABLED: ${{ vars.MERGE_QUEUE_ENABLED == 'false' && 'false' || 'true' }}
          MERGE_QUEUE_STUCK_MINUTES: ${{ vars.MERGE_QUEUE_STUCK_MINUTES }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request_review" ]] && [[ "${{ github.event.review.state }}" != "approved" ]]; then
            echo "Latest review was not an approval."
            exit 0
          fi

          owner="${REPOSITORY%%/*}"
          repo="${REPOSITORY#*/}"
          enabled_file="$(mktemp)"
          recovered_file="$(mktemp)"
          rearmed_file="$(mktemp)"
          failed_file="$(mktemp)"
          skipped_file="$(mktemp)"
          merge_group_runs_file=""
          stuck_queue_minutes="${MERGE_QUEUE_STUCK_MINUTES:-10}"

          append_summary_section() {
            local title="$1"
            local file_path="$2"

            if [[ ! -s "$file_path" ]]; then
              return
            fi

            {
              echo "### $title"
              cat "$file_path"
              echo
            } >> "$GITHUB_STEP_SUMMARY"
          }

          enable_auto_merge() {
            local url="$1"
            local head_ref_oid="$2"

            if [[ "$MERGE_QUEUE_ENABLED" == "true" ]]; then
              gh pr merge --auto --match-head-commit "$head_ref_oid" "$url"
              return
            fi

            gh pr merge --auto --squash --match-head-commit "$head_ref_oid" "$url"
          }

          minutes_since_iso8601() {
            local timestamp="$1"

            node -e '
              const timestamp = process.argv[1];
              const parsed = Date.parse(timestamp);
              if (!Number.isFinite(parsed)) {
                process.exit(1);
              }
              const minutes = Math.floor((Date.now() - parsed) / 60000);
              if (!Number.isFinite(minutes) || minutes < 0) {
                process.exit(1);
              }
              console.log(minutes);
            ' "$timestamp"
          }

          load_merge_group_runs() {
            if [[ -n "$merge_group_runs_file" ]]; then
              return
            fi

            merge_group_runs_file="$(mktemp)"
            gh api "repos/$REPOSITORY/actions/runs?event=merge_group&per_page=100" > "$merge_group_runs_file"
          }

          has_merge_group_run_since_enqueue() {
            local pr_number="$1"
            local base_ref_name="$2"
            local enqueued_at="$3"
            local queue_branch_prefix="gh-readonly-queue/${base_ref_name}/pr-${pr_number}-"

            load_merge_group_runs

            jq -e \
              --arg queue_branch_prefix "$queue_branch_prefix" \
              --arg enqueued_at "$enqueued_at" \
              '.workflow_runs
                | any(
                    .head_branch != null and
                    (.head_branch | startswith($queue_branch_prefix)) and
                    .created_at >= $enqueued_at
                  )' \
              "$merge_group_runs_file" >/dev/null
          }

          recover_stuck_merge_queue_entry() {
            local pr_id="$1"
            local head_ref_oid="$2"

            gh api graphql \
              -f query='mutation($id: ID!) { dequeuePullRequest(input: { id: $id }) { mergeQueueEntry { id } } }' \
              -f id="$pr_id" >/dev/null

            gh api graphql \
              -f query='mutation($pullRequestId: ID!, $expectedHeadOid: GitObjectID!) { enqueuePullRequest(input: { pullRequestId: $pullRequestId, expectedHeadOid: $expectedHeadOid }) { mergeQueueEntry { id state position } } }' \
              -f pullRequestId="$pr_id" \
              -f expectedHeadOid="$head_ref_oid" >/dev/null
          }

          process_pr_json() {
            local pr_json="$1"
            local pr_id
            local number
            local url
            local review_decision
            local merge_state
            local auto_merge_enabled_at
            local head_ref_oid
            local base_ref_name
            local head_repository
            local unresolved_threads
            local has_manual_merge_label
            local is_draft
            local is_in_merge_queue
            local merge_queue_state
            local merge_queue_enqueued_at
            local queued_minutes
            local author_login

            pr_id="$(printf '%s' "$pr_json" | jq -r '.id // ""')"
            number="$(printf '%s' "$pr_json" | jq -r '.number')"
            url="$(printf '%s' "$pr_json" | jq -r '.url')"
            review_decision="$(printf '%s' "$pr_json" | jq -r '.reviewDecision // ""')"
            merge_state="$(printf '%s' "$pr_json" | jq -r '.mergeStateStatus // ""')"
            auto_merge_enabled_at="$(printf '%s' "$pr_json" | jq -r '.autoMergeRequest.enabledAt // ""')"
            head_ref_oid="$(printf '%s' "$pr_json" | jq -r '.headRefOid // ""')"
            base_ref_name="$(printf '%s' "$pr_json" | jq -r '.baseRefName // ""')"
            head_repository="$(printf '%s' "$pr_json" | jq -r '.headRepository.nameWithOwner // ""')"
            unresolved_threads="$(
              printf '%s' "$pr_json" | jq '[.reviewThreads.nodes[] | select(.isResolved == false)] | length'
            )"
            has_manual_merge_label="$(
              printf '%s' "$pr_json" | jq -r '[.labels.nodes[].name] | index("manual-merge") != null'
            )"
            is_draft="$(printf '%s' "$pr_json" | jq -r '.isDraft')"
            is_in_merge_queue="$(printf '%s' "$pr_json" | jq -r '.isInMergeQueue')"
            merge_queue_state="$(printf '%s' "$pr_json" | jq -r '.mergeQueueEntry.state // ""')"
            merge_queue_enqueued_at="$(printf '%s' "$pr_json" | jq -r '.mergeQueueEntry.enqueuedAt // ""')"
            author_login="$(printf '%s' "$pr_json" | jq -r '.author.login // ""')"

            if [[ "$is_draft" == "true" ]]; then
              echo "- PR #$number: draft pull request." >> "$skipped_file"
              return
            fi

            if [[ "$author_login" == "dependabot[bot]" || "$author_login" == "app/dependabot" ]]; then
              echo "- PR #$number: dependabot pull request is handled by dedicated automation." >> "$skipped_file"
              return
            fi

            if [[ "$head_repository" != "$REPOSITORY" ]]; then
              echo "- PR #$number: head branch is not hosted in the base repository." >> "$skipped_file"
              return
            fi

            if [[ "$has_manual_merge_label" == "true" ]]; then
              echo "- PR #$number: manual-merge label is present." >> "$skipped_file"
              return
            fi

            if [[ "$review_decision" != "APPROVED" ]]; then
              echo "- PR #$number: pull request is not currently approved." >> "$skipped_file"
              return
            fi

            if [[ "$unresolved_threads" -gt 0 ]]; then
              echo "- PR #$number: pull request still has unresolved review threads." >> "$skipped_file"
              return
            fi

            if [[ "$merge_state" == "DIRTY" ]]; then
              echo "- PR #$number: merge conflicts require manual resolution." >> "$failed_file"
              return
            fi

            if [[ "$is_in_merge_queue" == "true" ]]; then
              if [[ "$MERGE_QUEUE_ENABLED" != "true" ]]; then
                echo "- PR #$number: already in merge queue while merge queue mode is disabled." >> "$skipped_file"
                return
              fi

              if [[ -z "$merge_queue_enqueued_at" || "$merge_queue_state" != "AWAITING_CHECKS" ]]; then
                echo "- PR #$number: already in merge queue with state ${merge_queue_state:-UNKNOWN}." >> "$skipped_file"
                return
              fi

              if ! queued_minutes="$(minutes_since_iso8601 "$merge_queue_enqueued_at" 2>/dev/null)"; then
                echo "- PR #$number: already in merge queue; could not parse enqueue timestamp." >> "$skipped_file"
                return
              fi

              if (( queued_minutes < stuck_queue_minutes )); then
                echo "- PR #$number: already in merge queue for ${queued_minutes} minute(s); waiting for GitHub's merge-queue grace window." >> "$skipped_file"
                return
              fi

              if has_merge_group_run_since_enqueue "$number" "$base_ref_name" "$merge_queue_enqueued_at"; then
                echo "- PR #$number: merge queue checks already started after enqueue; leaving queue entry in place." >> "$skipped_file"
                return
              fi

              if recover_stuck_merge_queue_entry "$pr_id" "$head_ref_oid"; then
                echo "- PR #$number: recovered stuck merge queue entry after ${queued_minutes} minute(s) without merge_group checks." >> "$recovered_file"
              else
                echo "- PR #$number: failed to recover stuck merge queue entry." >> "$failed_file"
              fi
              return
            fi

            if [[ -n "$auto_merge_enabled_at" && "$merge_state" != "CLEAN" ]]; then
              echo "- PR #$number: auto-merge is already enabled; waiting for merge state ${merge_state:-UNKNOWN} before queue re-arm." >> "$skipped_file"
              return
            fi

            if [[ -n "$auto_merge_enabled_at" ]]; then
              gh pr merge --disable-auto "$url"
              if enable_auto_merge "$url" "$head_ref_oid"; then
                echo "- PR #$number: re-armed auto-merge so GitHub can enqueue it again." >> "$rearmed_file"
              else
                echo "- PR #$number: failed to re-arm auto-merge for queue recovery." >> "$failed_file"
              fi
              return
            fi

            if enable_auto_merge "$url" "$head_ref_oid"; then
              echo "- PR #$number: enabled auto-merge." >> "$enabled_file"
            else
              echo "- PR #$number: failed to enable auto-merge." >> "$failed_file"
            fi
          }

          if [[ "$EVENT_NAME" == "pull_request_target" || "$EVENT_NAME" == "pull_request_review" ]]; then
            pr_json="$(
              gh api graphql \
                -F owner="$owner" \
                -F repo="$repo" \
                -F number="$PR_NUMBER" \
                -f query='query($owner: String!, $repo: String!, $number: Int!) { repository(owner: $owner, name: $repo) { pullRequest(number: $number) { id number url author { login } autoMergeRequest { enabledAt } baseRefName headRefOid headRepository { nameWithOwner } isDraft isInMergeQueue labels(first: 50) { nodes { name } } mergeQueueEntry { id state enqueuedAt } mergeStateStatus reviewDecision reviewThreads(first: 100) { nodes { isResolved } } } } }'
            )"

            pull_request_node="$(printf '%s' "$pr_json" | jq -c '.data.repository.pullRequest')"
            if [[ "$pull_request_node" != "null" && -n "$pull_request_node" ]]; then
              process_pr_json "$pull_request_node"
            fi
          else
            pr_json="$(
              gh api graphql \
                -F owner="$owner" \
                -F repo="$repo" \
                -f query='query($owner: String!, $repo: String!) { repository(owner: $owner, name: $repo) { pullRequests(first: 100, states: OPEN, orderBy: { field: UPDATED_AT, direction: DESC }) { nodes { id number url author { login } autoMergeRequest { enabledAt } baseRefName headRefOid headRepository { nameWithOwner } isDraft isInMergeQueue labels(first: 50) { nodes { name } } mergeQueueEntry { id state enqueuedAt } mergeStateStatus reviewDecision reviewThreads(first: 100) { nodes { isResolved } } } } } }'
            )"

            while IFS= read -r pr_node; do
              process_pr_json "$pr_node"
            done < <(printf '%s' "$pr_json" | jq -c '.data.repository.pullRequests.nodes[]')
          fi

          append_summary_section "Enabled auto-merge" "$enabled_file"
          append_summary_section "Recovered stuck merge queue entries" "$recovered_file"
          append_summary_section "Re-armed auto-merge" "$rearmed_file"
          append_summary_section "Failed auto-merge actions" "$failed_file"
          append_summary_section "Skipped pull requests" "$skipped_file"
