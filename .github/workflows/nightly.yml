name: Nightly Robustness

on:
  schedule:
    # Run at 3 AM UTC daily
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_API: ${{ vars.TURBO_API }}

concurrency:
  group: nightly-robustness
  cancel-in-progress: false

jobs:
  ui_gate_3x:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        attempt: [1, 2, 3]
    env:
      TURBO_CACHE_DIR: .turbo
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-pnpm
        with:
          install-command: pnpm install --offline --frozen-lockfile

      - uses: ./.github/actions/cache-turbo

      - name: Build code workspace (attempt ${{ matrix.attempt }})
        run: pnpm code:build

      - name: Desktop runtime fast verify (attempt ${{ matrix.attempt }})
        run: pnpm desktop:verify:fast

  runtime_proving_lane:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      TURBO_CACHE_DIR: .turbo
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-pnpm
        with:
          install-command: pnpm install --offline --frozen-lockfile

      - uses: ./.github/actions/cache-turbo

      - uses: ./.github/actions/setup-playwright
        with:
          install-command: pnpm -C tests/e2e exec playwright install --only-shell chromium

      - name: Run internal runtime proving lane
        run: pnpm runtime:prove

  summary:
    runs-on: ubuntu-latest
    needs: [ui_gate_3x, runtime_proving_lane]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Nightly Robustness Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| UI Gate 3x | ${{ needs.ui_gate_3x.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Runtime Proving Lane | ${{ needs.runtime_proving_lane.result }} |" >> $GITHUB_STEP_SUMMARY
